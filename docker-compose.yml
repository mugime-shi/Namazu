services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    ports:
      - "${API_PORT:-8100}:8000"
    environment:
      DATABASE_URL: postgresql://unagi:unagi@db:5432/unagi
      DEBUG: "true"
    env_file:
      - backend/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app        # hot-reload in development
      - ./backend/unagi:/app/unagi    # CLI access inside container

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: unagi
      POSTGRES_PASSWORD: unagi
      POSTGRES_DB: unagi
    ports:
      - "${DB_PORT:-5533}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unagi -d unagi"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
